appId: com.watchflix.desktop
productName: Watchflix
icon: build/icon.png

directories:
  output: dist

# Only pack the Electron main script; everything else ships as extraResources
files:
  - main.js

extraResources:
  # Staged API bundle with standalone node_modules (built by scripts/prebuild-api.sh)
  - from: .api-bundle
    to: api
    filter:
      - "**/*"
  # Pre-built UI assets (run `npm run build -w ui` before packaging)
  - from: ../ui/dist
    to: ui-dist

mac:
  category: public.app-category.entertainment
  target:
    - target: dmg
      arch:
        - x64
        - arm64

win:
  target:
    - target: nsis
      arch:
        - x64
  # better-sqlite3 prebuilds cover Windows x64, so no extra config needed

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

linux:
  category: AudioVideo
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
    - target: tar.gz
      arch:
        - x64

# Rebuild native modules (e.g. better-sqlite3) against Electron's Node version
npmRebuild: true
